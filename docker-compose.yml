version: '3.8'

services:
  # ─── Database ─────────────────────────────────────────
  db:
    image: postgres:13
    container_name: stock-control-db
    environment:
      POSTGRES_DB: stock_control
      POSTGRES_USER: usertest
      POSTGRES_PASSWORD: usertest123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usertest -d stock_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Backend (Quarkus) ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: stock-control-backend
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/stock_control
      QUARKUS_DATASOURCE_USERNAME: usertest
      QUARKUS_DATASOURCE_PASSWORD: usertest123
      QUARKUS_HTTP_CORS_ENABLED: "true"
      QUARKUS_HTTP_CORS_ORIGINS: "/.*/"
      QUARKUS_HTTP_CORS_METHODS: GET,POST,PUT,DELETE,OPTIONS
      QUARKUS_HTTP_CORS_HEADERS: Content-Type,Authorization
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
