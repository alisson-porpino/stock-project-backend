# ===========================================
# Stock Control - Backend Config
# ===========================================

# Datasource Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=usertest
quarkus.datasource.password=usertest123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/stock_control

# Hibernate ORM
# "update" is to create/update tables automatically based on the entities
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

# CORS Configuration
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

# OpenAPI / Swagger
quarkus.smallrye-openapi.info-title=Stock Control API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Manufacturing stock control REST API - Projedata Technical Test
quarkus.swagger-ui.always-include=true